name: Update Loon rules

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"
  push:
    branches: [main]
    paths:
      - ".github/workflows/merge-rules.yml"
      - "scripts/**"
      - "tests/**"
      - "cn.list"
      - "us.list"
      - "openai.list"

concurrency:
  group: update-loon-rules
  cancel-in-progress: false

jobs:
  update-rules:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Generate rule sets
        run: python scripts/merge_rules.py

      - name: Check generated files
        run: |
          test -s ai.list
          test -s proxy.list
          test -s china.list
          wc -l ai.list proxy.list china.list

      - name: Commit updated rules
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add ai.list proxy.list china.list
          if git diff --staged --quiet; then
            echo "Rules are unchanged"
          else
            git commit -m "Auto-update Loon rules"
            git push
          fi
